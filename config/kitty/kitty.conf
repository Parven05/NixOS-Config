# Shell
shell fish

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Cursor
cursor_shape               beam
cursor_beam_thickness      1.5
cursor_blink_interval      0.5
cursor_stop_blinking_after 15.0
cursor_trail                1
cursor_trail_decay          0.1 0.4
cursor_trail_start_threshold 2

# Colors (from stylix palette — overrides Stylix auto-generated colors)
background #111418
foreground #c9d1d9
selection_background #1f242b
selection_foreground #c9d1d9
url_color #6ea8e0
cursor #c9d1d9
cursor_text_color #111418

# Black
color0  #111418
color8  #6e7681

# Red
color1  #be5a55
color9  #be5a55

# Green
color2  #6eaa82
color10 #6eaa82

# Yellow
color3  #c8aa5a
color11 #c8aa5a

# Blue
color4  #6ea8e0
color12 #6ea8e0

# Magenta
color5  #aa82aa
color13 #aa82aa

# Cyan
color6  #5aaaaf
color14 #5aaaaf

# White
color7  #c9d1d9
color15 #f0f2f5

# Background (matches Waybar island transparency: 75%)
background_opacity 0.75
dynamic_background_opacity yes

# Window
window_padding_width 8
confirm_os_window_close 0
hide_window_decorations no
remember_window_size  yes

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{title}"

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Mouse
mouse_hide_wait 3.0
copy_on_select yes
strip_trailing_spaces smart

# Performance
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# Layouts
enabled_layouts tall,fat,grid,stack

# Bell
enable_audio_bell no
visual_bell_duration 0.2
