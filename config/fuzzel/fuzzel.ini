# ── Fuzzel config — matched to Waybar / Stylix aesthetic ──────────────
# Colors derived from the stylix base16 scheme:
#   bg:  base00 (#111418)   surface: base01 (#181c22)
#   fg:  base05 (#c9d1d9)   accent:  base0D (#6ea8e0)

[main]
font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes
terminal=kitty
icon-theme=Fluent
fields=filename,name,generic
width=50
lines=16
layer=overlay
prompt=  
placeholder=  Search…

[colors]
background=111418f0
text=c9d1d9ff
match=6ea8e0ff
selection=1f242bff
selection-text=c9d1d9ff
selection-match=6ea8e0ff
border=6ea8e0ff

[border]
width=2
radius=8
