[main]
font=JetBrainsMono Nerd Font:size=8
dpi-aware=yes
terminal=kitty
icon-theme=Fluent
fields=filename,name,generic
width=28
lines=12
layer=overlay
prompt=
placeholder=Search…

# Colors derived from stylix base16Scheme
# bg:    base00 → #111418
# fg:    base05 → #c9d1d9
# match: base0D → #6ea8e0 (blue accent)
# sel:   base02 → #1f242b
[colors]
background=111418f0
text=c9d1d9ff
match=6ea8e0ff
selection=1f242bff
selection-text=c9d1d9ff
selection-match=6ea8e0ff
border=6ea8e0ff

[border]
width=0
radius=8

# Compact & clean: minimal padding, tight list
[dmenu]
exit-immediately-if-empty=no
