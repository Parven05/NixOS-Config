position = "Top"
animations = { enabled = true }

[modules]
left = ["Workspaces"]
center = ["Tempo"]
right = [["Tray"], ["SystemInfo", "MediaPlayer", "Privacy", "Settings"]]

[tray]
blocklist = ["nm-applet", "blueman-applet"]

[tempo]
clock_format = "%a %d %b %R"
weather_indicator = "IconAndTemperature"

[workspaces]
visibility_mode = "All"

[system_info]
indicators = ["Cpu", "Memory", {Disk = "/"}]
interval = 5

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[system_info.disk]
warn_threshold = 80
alert_threshold = 90

[settings]
lock_cmd = "swaylock"
logout_cmd = "loginctl kill-user $(whoami)"
audio_sinks_more_cmd = "pavucontrol"
audio_sources_more_cmd = "pavucontrol -t 4"
battery_format = "IconAndPercentage"
peripheral_battery_format = "Icon"
indicators = ["IdleInhibitor", "PowerProfile", "Audio", "Microphone", "Bluetooth", "Network", "Battery", "Brightness"]

[appearance]
style = "Islands"
scale_factor = 1.12
opacity = 0.92

[appearance.background]
base = "#1e1e2e"
weak = "#181825"
strong = "#313244"
text = "#cdd6f4"

[appearance.primary]
base = "#89b4fa"
weak = "#74c7ec"
strong = "#b4d0fb"
text = "#1e1e2e"

[appearance.success]
base = "#a6e3a1"
weak = "#94e2d5"
strong = "#b8e6b4"
text = "#1e1e2e"

[appearance.warning]
base = "#f9e2af"
weak = "#fab387"
strong = "#fce2b5"
text = "#1e1e2e"

[appearance.danger]
base = "#f38ba8"
weak = "#eba0ac"
strong = "#f5a0b5"
text = "#1e1e2e"

[appearance.text]
base = "#cdd6f4"
weak = "#a6adc8"
text = "#1e1e2e"

[appearance.menu]
opacity = 0.96
backdrop_blur = true

workspace_colors = ["#89b4fa", "#a6e3a1", "#f9e2af", "#f38ba8", "#cba6f7", "#94e2d5", "#fab387", "#74c7ec"]
