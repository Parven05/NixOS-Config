position = "Top"

[modules]
left = [ "Workspaces" ]
center = [ "Tempo" ]
right = [ [ "Tray", "SystemInfo", "MediaPlayer", "Privacy", "Settings" ] ]

[tempo]
clock_format = "%a %d %b %R"
weather_indicator = "None"

[workspaces]
visibility_mode = "All"
indicator_format = "NameAndIcons"

[system_info]
indicators = [ "Cpu", "Memory", "Temperature" ]
interval = 5

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[settings]
lock_cmd = "swaylock"
logout_cmd = "loginctl kill-user $(whoami)"
audio_sinks_more_cmd = "pavucontrol"
audio_sources_more_cmd = "pavucontrol -t 4"
indicators = [ "IdleInhibitor", "PowerProfile", "Audio", "Microphone", "Bluetooth", "Network", "Vpn", "Battery", "Brightness" ]
battery_format = "IconAndPercentage"
peripheral_battery_format = "Icon"

[appearance]
primary_color = "#6ea8e0"
success_color = "#6eaa82"
warning_color = "#c8aa5a"
danger_color = "#be5a55"
text_color = "#c9d1d9"
workspace_colors = [ "#6ea8e0", "#c9d1d9" ]

[appearance.bar]
surface = "transparent"
margin = "xs"
opacity = 0.85
