# ─────────────────────────────────────────────────────────────────────
# Yazi theme · Unified Stylix palette (overrides preset theme-dark)
# Colors in the format used by Yazi's preset theme system
# bg:     #111418  (base00)
# surf:   #1f242b  (base02)
# dim:    #6e7681  (base03)
# muted:  #8b97a3  (base04)
# fg:     #c9d1d9  (base05)
# bright: #f0f2f5  (base07)
# accent: #6ea8e0  (base0D · blue)
# cyan:   #5aaaaf  (base0C)
# green:  #6eaa82  (base0B)
# yellow: #c8aa5a  (base0A)
# orange: #be825a  (base09)
# red:    #be5a55  (base08)
# purple: #aa82aa  (base0E)
# pink:   #a892b8  (base0F)
# ─────────────────────────────────────────────────────────────────────

# No flavor — using direct overrides
[flavor]
dark  = ""
light = ""

# : Mode indicator (NORMAL / SELECT / VISUAL) ────────────────────────
# Designed like Waybar workspace pills
[mode]
normal_main = { bg = "#111418", fg = "#6ea8e0", bold = true }
normal_alt  = { fg = "#6ea8e0", bg = "#1f242b" }
select_main = { bg = "#aa82aa", fg = "#111418", bold = true }
select_alt  = { fg = "#aa82aa", bg = "#1f242b" }
unset_main  = { bg = "#be5a55", fg = "#111418", bold = true }
unset_alt   = { fg = "#be5a55", bg = "#1f242b" }

# : Status bar ───────────────────────────────────────────────────────
# Dark bar style matching Waybar
[status]
overall   = { bg = "#111418", fg = "#c9d1d9" }
sep_left  = { open = " ", close = " " }
sep_right = { open = " ", close = " " }

# Permissions
perm_sep   = { fg = "#6e7681" }
perm_type  = { fg = "#6ea8e0" }
perm_read  = { fg = "#c8aa5a" }
perm_write = { fg = "#be5a55" }
perm_exec  = { fg = "#5aaaaf" }

# Progress
progress_label  = { fg = "#c9d1d9", bold = true }
progress_normal = { fg = "#6eaa82", bg = "#1f242b" }
progress_error  = { fg = "#c8aa5a", bg = "#be5a55" }

# : App ──────────────────────────────────────────────────────────────
[app]
overall = { bg = "#111418", fg = "#c9d1d9" }

# : Manager ──────────────────────────────────────────────────────────
[mgr]
cwd = { fg = "#6ea8e0", bold = true }

# Find
find_keyword  = { fg = "#c8aa5a", bold = true }
find_position = { fg = "#aa82aa", bg = "reset", bold = true }

# Symlink
symlink_target = { fg = "#5aaaaf", italic = true }

# Marker
marker_copied   = { fg = "#6eaa82", bg = "#6eaa82" }
marker_cut      = { fg = "#be5a55", bg = "#be5a55" }
marker_marked   = { fg = "#6ea8e0", bg = "#6ea8e0" }
marker_selected = { fg = "#c8aa5a", bg = "#c8aa5a" }
marker_symbol   = "│"

# Count
count_copied   = { fg = "#111418", bg = "#6eaa82" }
count_cut      = { fg = "#111418", bg = "#be5a55" }
count_selected = { fg = "#111418", bg = "#c8aa5a" }

# Border
border_symbol = "│"
border_style  = { fg = "#1f242b" }

# : Task manager ─────────────────────────────────────────────────────
[tasks]
border  = { fg = "#6ea8e0" }
title   = { fg = "#c9d1d9", bold = true }
hovered = { fg = "#c9d1d9", bg = "#1f242b" }

# : Tabs ─────────────────────────────────────────────────────────────
[tabs]
active   = { bg = "#6ea8e0", fg = "#111418", bold = true }
inactive = { fg = "#6ea8e0", bg = "#1f242b" }
sep_inner = { open = " ", close = " " }
sep_outer = { open = " ", close = " " }

# : Indicator ────────────────────────────────────────────────────────
[indicator]
parent  = { reversed = true, fg = "#c9d1d9" }
current = { reversed = true, fg = "#c9d1d9" }
preview = {}
padding = { open = " ", close = " " }

# : Which ────────────────────────────────────────────────────────────
[which]
cols            = 3
mask            = { bg = "#111418" }
cand            = { fg = "#5aaaaf" }
rest            = { fg = "#6e7681" }
desc            = { fg = "#8b97a3" }
separator       = " "
separator_style = { fg = "#6e7681" }

# : Confirmation ─────────────────────────────────────────────────────
[confirm]
border  = { fg = "#6ea8e0" }
title   = { fg = "#6ea8e0", bold = true }
body    = { fg = "#c9d1d9" }
list    = { fg = "#c9d1d9" }
btn_yes = { fg = "#111418", bg = "#6eaa82", bold = true }
btn_no  = { fg = "#c9d1d9", bg = "#1f242b" }

# : Notification ─────────────────────────────────────────────────────
[notify]
title_info  = { fg = "#6ea8e0" }
title_warn  = { fg = "#be825a" }
title_error = { fg = "#be5a55" }
icon_info   = ""
icon_warn   = ""
icon_error  = ""

# : Picker ───────────────────────────────────────────────────────────
[pick]
border   = { fg = "#6ea8e0" }
active   = { fg = "#c9d1d9", bg = "#1f242b", bold = true }
inactive = { fg = "#6e7681" }

# : Input ────────────────────────────────────────────────────────────
[input]
border   = { fg = "#6ea8e0" }
title    = { fg = "#c9d1d9" }
value    = { fg = "#c9d1d9", bg = "#111418" }
selected = { fg = "#111418", bg = "#6ea8e0" }

# : Completion ───────────────────────────────────────────────────────
[cmp]
border   = { fg = "#6ea8e0" }
active   = { fg = "#c9d1d9", bg = "#1f242b" }
inactive = { fg = "#6e7681" }

# : Spotter ──────────────────────────────────────────────────────────
[spot]
border   = { fg = "#6ea8e0" }
title    = { fg = "#6ea8e0" }
tbl_col  = { fg = "#6ea8e0" }
tbl_cell = { fg = "#c8aa5a", reversed = true }

# : Help ─────────────────────────────────────────────────────────────
[help]
border  = { fg = "#6ea8e0" }
chord   = { fg = "#5aaaaf" }
action  = { fg = "#c9d1d9" }
hovered = { fg = "#c9d1d9", bg = "#1f242b", bold = true }

# : File-specific styles ─────────────────────────────────────────────
[filetype]
rules = [
	{ mime = "image/*",                         fg = "#c8aa5a" },
	{ mime = "{audio,video}/*",                 fg = "#aa82aa" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#be5a55" },
	{ mime = "application/{pdf,doc,rtf}",        fg = "#5aaaaf" },
	{ mime = "vfs/{absent,stale}",              fg = "#6e7681" },
	{ url = "*", is = "orphan",                 bg = "#be5a55" },
	{ url = "*", is = "exec",                   fg = "#6eaa82" },
	{ url = "*", is = "dummy",                  bg = "#be5a55" },
	{ url = "*/", is = "dummy",                 bg = "#be5a55" },
	{ url = "*/",                               fg = "#6ea8e0" },
]
