<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <title>~/start</title>
  <style>
    /* ── stylix base16 palette ── */
    :root {
      --bg: #111418;
      --bg-alt: #181c22;
      --surface: #1f242b;
      --fg-dim: #6e7681;
      --fg-muted: #8b97a3;
      --fg: #c9d1d9;
      --fg-bright: #e6e9ed;
      --fg-max: #f0f2f5;
      --red: #be5a55;
      --orange: #be825a;
      --yellow: #c8aa5a;
      --green: #6eaa82;
      --cyan: #5aaaaf;
      --blue: #6ea8e0;
      --purple: #aa82aa;
      --pink: #a892b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', monospace;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 16vh;
    }

    /* ── main container ── */
    .app {
      width: 600px;
      max-width: 92vw;
    }

    /* ── search wrapper (fuzzel-style) ── */
    .search-wrapper {
      position: relative;
      margin-bottom: 0;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--blue);
      font-size: 18px;
      pointer-events: none;
      z-index: 2;
    }

    #search {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--surface);
      border: 1px solid var(--surface);
      border-radius: 10px;
      color: var(--fg);
      font-family: inherit;
      font-size: 16px;
      outline: none;
      caret-color: var(--blue);
      transition: border-color .15s, box-shadow .15s;
    }

    #search::placeholder {
      color: var(--fg-dim);
    }

    #search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px var(--blue);
    }

    /* ── results list ── */
    .results {
      margin-top: 6px;
      border-radius: 10px;
      overflow: hidden;
      display: none;
      background: var(--bg);
      border: 1px solid var(--surface);
    }

    .results:has(.result-item) {
      display: block;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      color: var(--fg);
      text-decoration: none;
      transition: background .08s;
      border-left: 3px solid transparent;
    }

    .result-item.selected,
    .result-item:hover {
      background: var(--surface);
      border-left-color: var(--blue);
    }

    .result-item .icon {
      font-size: 18px;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }

    .result-item .info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .result-item .name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-item .name mark {
      background: none;
      color: var(--blue);
    }

    .result-item .sub {
      display: none;
    }

    .result-item.web-search .icon {
      color: var(--blue);
    }

    .result-item.web-search .name mark {
      color: var(--blue);
    }

    /* ── empty state ── */
    .greeting {
      text-align: center;
      margin-top: 40px;
      color: var(--fg-dim);
      font-size: 14px;
      opacity: 0.6;
      transition: opacity .2s;
    }

    .greeting.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .title {
      text-align: center;
      font-family: 'JetBrains Mono', 'JetBrainsMono Nerd Font', monospace;
      font-size: 60px;
      font-weight: 700;
      color: var(--fg);
      margin-bottom: 32px;
      letter-spacing: -1px;
      line-height: 1.0;
    }

    /* ── clock ── */
    .clock {
      text-align: center;
      font-size: 13px;
      color: var(--fg-dim);
      opacity: 0.5;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="title">pi browser</div>

    <div class="search-wrapper">
      <span class="search-icon">󰍉</span>
      <input id="search" type="text" placeholder="Search shortcuts or web…" autofocus autocomplete="off"
        spellcheck="false">
    </div>

    <div class="clock" id="clock"></div>

    <div class="results" id="results"></div>



    <div class="greeting" id="greeting">
    </div>
  </div>

  <script>
    // ── bookmarks ──
    const bookmarks = [
      { name: "Proton Mail", url: "https://mail.proton.me/u/1/inbox", cat: "Personal", icon: "󰊫" },
      { name: "Google Drive", url: "https://drive.google.com/drive/", cat: "Personal", icon: "󰇺" },
      { name: "YouTube", url: "https://www.youtube.com/feed/subscriptions", cat: "Personal", icon: "󰗃" },
      { name: "Telegram", url: "https://web.telegram.org/a/", cat: "Personal", icon: "󰈷" },
      { name: "WhatsApp", url: "https://web.whatsapp.com/", cat: "Personal", icon: "󰈲" },
      { name: "Vercel", url: "https://vercel.com/", cat: "Hosting", icon: "󰪣" },
      { name: "Cloudflare", url: "https://dash.cloudflare.com/", cat: "Hosting", icon: "󰑤" },
      { name: "Unimap Elearning", url: "https://elearning.unimap.edu.my/", cat: "Academic", icon: "󰑓" },
      { name: "OSI Unimap", url: "https://osi.unimap.edu.my/OSI_V2/", cat: "Academic", icon: "󱎘" },
      { name: "NixOS Search", url: "https://search.nixos.org/packages", cat: "Nix", icon: "󱄅" },
      { name: "NixOS Forum", url: "https://discourse.nixos.org/", cat: "Nix", icon: "󰓩" },
      { name: "NixOS Wiki", url: "https://wiki.nixos.org/wiki/NixOS_Wiki", cat: "Nix", icon: "󰖿" },
      { name: "Deepseek", url: "https://platform.deepseek.com/usage", cat: "AI", icon: "󰮊" },
      { name: "Qwen AI", url: "https://chat.qwen.ai/", cat: "AI", icon: "󰚥" },
      { name: "Stack Overflow", url: "https://stackoverflow.com/", cat: "Blog", icon: "󰓃" },
      { name: "Karl Blog", url: "https://codeberg.org/ziglings/exercises/#ziglings", cat: "Blog", icon: "󰈙" },
      { name: "Photopea", url: "https://www.photopea.com/", cat: "Tools", icon: "󰏘" },
      { name: "Odin Forum", url: "https://forum.odin-lang.org/", cat: "Odin", icon: "󰘦" },
      { name: "Odin Docs", url: "https://odin-lang.org/docs/", cat: "Odin", icon: "󰘦" },
      { name: "GitHub", url: "https://github.com/", cat: "Dev", icon: "󰊤" },
    ];

    // ── fuzzy match ──
    function fuzzyMatch(query, str) {
      const q = query.toLowerCase();
      const s = str.toLowerCase();
      let qi = 0;
      for (let si = 0; si < s.length && qi < q.length; si++) {
        if (s[si] === q[qi]) qi++;
      }
      return qi === q.length;
    }

    // highlight matched characters
    function highlight(str, query) {
      if (!query) return escapeHtml(str);
      const q = query.toLowerCase();
      const s = str.toLowerCase();
      const result = [];
      let qi = 0;
      let buf = '';
      for (let si = 0; si < str.length; si++) {
        if (qi < q.length && s[si] === q[qi]) {
          if (buf) { result.push(escapeHtml(buf)); buf = ''; }
          result.push('<mark>' + escapeHtml(str[si]) + '</mark>');
          qi++;
        } else {
          buf += str[si];
        }
      }
      if (buf) result.push(escapeHtml(buf));
      return result.join('');
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escapeAttr(s) {
      return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── dom refs ──
    const searchEl = document.getElementById('search');
    const resultsEl = document.getElementById('results');
    const greetingEl = document.getElementById('greeting');
    const clockEl = document.getElementById('clock');

    let selectedIdx = 0;
    let currentResults = [];

    // ── clock ──
    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleString('en-US', {
        weekday: 'long', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
      });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── render results ──
    function render(query) {
      const q = query.trim();
      resultsEl.innerHTML = '';
      currentResults = [];
      selectedIdx = 0;

      // web search entry (always first when query non-empty)
      if (q) {
        currentResults.push({
          type: 'web',
          name: 'Search the web for "' + q + '"',
          url: 'https://search.brave.com/search?q=' + encodeURIComponent(q),
          icon: '󰍉',
          cat: 'Brave Search',
        });
      }

      // fuzzy match bookmarks
      if (q) {
        const matches = [];
        for (const bm of bookmarks) {
          const searchStr = bm.name + ' ' + bm.cat + ' ' + bm.url;
          if (fuzzyMatch(q, bm.name) || fuzzyMatch(q, searchStr)) {
            // score: exact word start matches rank higher
            let score = 0;
            const nameLow = bm.name.toLowerCase();
            const qLow = q.toLowerCase();
            if (nameLow.startsWith(qLow)) score += 100;
            if (fuzzyMatch(q, bm.name)) score += 50;
            if (fuzzyMatch(q, bm.cat)) score += 10;
            matches.push({ ...bm, type: 'bookmark', score });
          }
        }
        matches.sort((a, b) => b.score - a.score);
        currentResults.push(...matches);
      }

      if (currentResults.length === 0) {
        greetingEl.classList.remove('hidden');
        return;
      }

      greetingEl.classList.add('hidden');

      for (let i = 0; i < currentResults.length; i++) {
        const item = currentResults[i];
        const div = document.createElement('div');
        div.className = 'result-item' + (item.type === 'web' ? ' web-search' : '');
        if (i === 0) div.classList.add('selected');

        const nameHtml = item.type === 'web'
          ? highlight('Search the web for "' + q + '"', q)
          : highlight(item.name, q);

        div.innerHTML = `
          <span class="icon">${item.icon}</span>
          <span class="info">
            <span class="name">${nameHtml}</span>
          </span>
        `;

        div.addEventListener('click', () => openResult(i));
        div.addEventListener('mouseenter', () => selectResult(i));
        resultsEl.appendChild(div);
      }
    }

    function selectResult(idx) {
      if (idx < 0 || idx >= currentResults.length) return;
      selectedIdx = idx;
      const items = resultsEl.querySelectorAll('.result-item');
      items.forEach((el, i) => el.classList.toggle('selected', i === idx));
      // scroll into view
      if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
    }

    function openResult(idx) {
      if (idx < 0 || idx >= currentResults.length) return;
      const item = currentResults[idx];
      if (item.url) window.location.href = item.url;
    }

    // ── input events ──
    searchEl.addEventListener('input', () => {
      render(searchEl.value);
    });

    searchEl.addEventListener('keydown', e => {
      const len = currentResults.length;

      if (e.key === 'ArrowDown' || (e.ctrlKey && e.key === 'n')) {
        e.preventDefault();
        if (len === 0) return;
        selectResult((selectedIdx + 1) % len);
      }
      else if (e.key === 'ArrowUp' || (e.ctrlKey && e.key === 'p')) {
        e.preventDefault();
        if (len === 0) return;
        selectResult((selectedIdx - 1 + len) % len);
      }
      else if (e.key === 'Enter') {
        e.preventDefault();
        if (len > 0) openResult(selectedIdx);
      }
      else if (e.key === 'Escape') {
        e.preventDefault();
        searchEl.value = '';
        searchEl.focus();
        render('');
      }

    });

    // keep focus on search even when clicking elsewhere in the app
    document.addEventListener('click', e => {
      if (!e.target.closest('.result-item')) {
        searchEl.focus();
      }
    });

    // initial render
    render('');
  </script>
</body>

</html>
